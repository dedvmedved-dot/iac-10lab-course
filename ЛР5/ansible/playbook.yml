---
- name: Setup etcd cluster
  hosts: etcd
  become: true
  vars:
    etcd_version: "3.5.17"
  tasks:
    - name: Download etcd binary
      get_url:
        url: "https://github.com/etcd-io/etcd/releases/download/v{{ etcd_version }}/etcd-v{{ etcd_version }}-linux-amd64.tar.gz"
        dest: /tmp/etcd.tar.gz
        mode: '0644'
      tags: [etcd, install]

    - name: Extract etcd
      unarchive:
        src: /tmp/etcd.tar.gz
        dest: /usr/local/bin/
        remote_src: true
        extra_opts: ["--strip-components=1", "etcd-v{{ etcd_version }}-linux-amd64/etcd", "etcd-v{{ etcd_version }}-linux-amd64/etcdctl", "etcd-v{{ etcd_version }}-linux-amd64/etcdutl"]
      tags: [etcd, install]

    - name: Create etcd data dir
      file:
        path: /var/lib/etcd/default
        state: directory
        owner: root
        mode: '0755'
      tags: [etcd, config]

    - name: Configure etcd
      template:
        src: etcd.env.j2
        dest: /etc/default/etcd
      notify: restart etcd
      tags: [etcd, config]

    - name: Create etcd systemd service
      copy:
        dest: /etc/systemd/system/etcd.service
        content: |
          [Unit]
          Description=etcd key-value store
          After=network-online.target
          Wants=network-online.target

          [Service]
          EnvironmentFile=/etc/default/etcd
          ExecStart=/usr/local/bin/etcd
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: restart etcd
      tags: [etcd, config]

    - name: Start etcd
      systemd:
        name: etcd
        state: started
        enabled: true
        daemon_reload: true
      tags: [etcd]

  handlers:
    - name: restart etcd
      systemd:
        name: etcd
        state: restarted
        daemon_reload: true

- name: Setup PostgreSQL with Patroni
  hosts: postgres
  become: true
  vars:
    pg_version: "16"
  tasks:
    - name: Install PostgreSQL
      apt:
        name:
          - "postgresql-{{ pg_version }}"
          - "postgresql-client-{{ pg_version }}"
          - python3-pip
        state: present
        update_cache: true
      tags: [pg, install]

    - name: Stop default PostgreSQL
      systemd:
        name: "postgresql@{{ pg_version }}-main"
        state: stopped
        enabled: false
      ignore_errors: true
      tags: [pg]

    - name: Install Patroni via pip
      pip:
        name: "patroni[etcd]"
        state: present
        break_system_packages: true
      tags: [patroni, install]

    - name: Create Patroni config dir
      file:
        path: /etc/patroni
        state: directory
      tags: [patroni, config]

    - name: Configure Patroni
      template:
        src: patroni.yml.j2
        dest: /etc/patroni/patroni.yml
      tags: [patroni, config]

    - name: Create Patroni systemd service
      copy:
        dest: /etc/systemd/system/patroni.service
        content: |
          [Unit]
          Description=Patroni PostgreSQL HA
          After=network-online.target
          Wants=network-online.target

          [Service]
          ExecStart=/usr/local/bin/patroni /etc/patroni/patroni.yml
          Restart=always
          RestartSec=5
          User=postgres
          Group=postgres

          [Install]
          WantedBy=multi-user.target
      tags: [patroni, config]

    - name: Start Patroni
      systemd:
        name: patroni
        state: started
        enabled: true
        daemon_reload: true
      tags: [patroni]

- name: Setup HAProxy
  hosts: haproxy
  become: true
  tasks:
    - name: Install HAProxy
      apt:
        name: haproxy
        state: present
      tags: [haproxy, install]

    - name: Configure HAProxy
      template:
        src: haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
      notify: reload haproxy
      tags: [haproxy, config]

    - name: Start HAProxy
      systemd:
        name: haproxy
        state: started
        enabled: true
      tags: [haproxy]

  handlers:
    - name: reload haproxy
      systemd:
        name: haproxy
        state: reloaded
