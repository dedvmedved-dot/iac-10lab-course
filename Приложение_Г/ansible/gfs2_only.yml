---
- name: Setup GFS2 nodes
  hosts: gfs2_nodes
  become: true
  tasks:
    - name: Install packages
      apt:
        name:
          - open-iscsi
          - lvm2
          - gfs2-utils
        state: present
      ignore_errors: yes

    - name: Install cluster packages (may fail if Ubuntu)
      apt:
        name:
          - dlm-controld
          - corosync
          - pacemaker
        state: present
      ignore_errors: yes

    - name: Discover iSCSI target
      command: iscsiadm -m discovery -t st -p 192.168.0.230
      changed_when: false

    - name: Login to iSCSI target
      command: iscsiadm -m node -T iqn.2025-04.lab.lr11:target1 -p 192.168.0.230 --login
      register: login_result
      failed_when: login_result.rc != 0 and 'already' not in login_result.stderr
      changed_when: login_result.rc == 0

    - name: Enable services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - lvmlockd
        - dlm
        - corosync
